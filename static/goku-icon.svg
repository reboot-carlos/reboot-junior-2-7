<svg width="256" height="256" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient fond noir à gris -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient pour le crâne -->
    <linearGradient id="skullGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D0D0D0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B0B0B0;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient pour les ombres -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </linearGradient>

    <!-- Dégradé pour les yeux (noir/orange) -->
    <radialGradient id="eyeGlow" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </radialGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fond dégradé noir à gris -->
  <rect width="100" height="120" fill="url(#bgGrad)"/>

  <!-- Ombre du crâne -->
  <ellipse cx="50" cy="105" rx="35" ry="8" fill="#000000" opacity="0.2"/>

  <!-- BOÎTE CRÂNIENNE PRINCIPALE -->
  <ellipse cx="50" cy="35" rx="28" ry="32" fill="url(#skullGrad)" stroke="#888888" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Arête nasale (relief) -->
  <path d="M 50 20 L 48 35 L 52 35" fill="#C0C0C0" stroke="#888888" stroke-width="0.8"/>

  <!-- Ombres internes du crâne -->
  <ellipse cx="50" cy="40" rx="26" ry="28" fill="none" stroke="#666666" stroke-width="1" opacity="0.4"/>

  <!-- CAVITÉS OCULAIRES (yeux) -->
  <!-- Orbite gauche -->
  <ellipse cx="37" cy="28" rx="8.5" ry="11" fill="#1a1a1a" stroke="#555555" stroke-width="1.2"/>
  <!-- Iris/pupille gauche (flamboyant) -->
  <circle cx="37" cy="30" r="6" fill="url(#eyeGlow)"/>
  <circle cx="37" cy="30" r="4" fill="#FF4500" opacity="0.8"/>
  <circle cx="38" cy="28" r="2" fill="#FFD700" opacity="0.9"/>
  <!-- Reflet dans l'oeil gauche -->
  <circle cx="39" cy="27" r="1" fill="#FFFFFF" opacity="0.8"/>

  <!-- Orbite droite -->
  <ellipse cx="63" cy="28" rx="8.5" ry="11" fill="#1a1a1a" stroke="#555555" stroke-width="1.2"/>
  <!-- Iris/pupille droit (flamboyant) -->
  <circle cx="63" cy="30" r="6" fill="url(#eyeGlow)"/>
  <circle cx="63" cy="30" r="4" fill="#FF4500" opacity="0.8"/>
  <circle cx="64" cy="28" r="2" fill="#FFD700" opacity="0.9"/>
  <!-- Reflet dans l'oeil droit -->
  <circle cx="65" cy="27" r="1" fill="#FFFFFF" opacity="0.8"/>

  <!-- CAVITÉ NASALE -->
  <!-- Trou nasal principal (forme triangulaire) -->
  <path d="M 50 38 L 46 44 L 54 44 Z" fill="#1a1a1a" stroke="#555555" stroke-width="0.8"/>
  <!-- Ombre dans la cavité nasale -->
  <path d="M 50 39 L 47 43 L 53 43" fill="#0a0a0a" opacity="0.6"/>

  <!-- MÂCHOIRE SUPÉRIEURE -->
  <path d="M 24 46 Q 24 52 35 56 L 65 56 Q 76 52 76 46" fill="url(#skullGrad)" stroke="#888888" stroke-width="1.2"/>

  <!-- Ligne de séparation mâchoire -->
  <path d="M 24 46 Q 50 48 76 46" stroke="#999999" stroke-width="1" opacity="0.5"/>

  <!-- DENTS SUPÉRIEURES (détaillées) -->
  <g id="upperTeeth">
    <!-- Dents 1-2 (gauche) -->
    <rect x="26" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="31.5" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
    <!-- Dents 3-4 (centre-gauche) -->
    <rect x="37" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="42.5" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
    <!-- Dents 5-6 (centre-droit) -->
    <rect x="48" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="53.5" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
    <!-- Dents 7-8 (droite) -->
    <rect x="59" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="64.5" y="46" width="4.5" height="8" fill="#F5F5F5" stroke="#AAAAAA" stroke-width="0.7"/>
  </g>

  <!-- Ligne d'ombres sur les dents -->
  <line x1="26" y1="50" x2="69" y2="50" stroke="#CCCCCC" stroke-width="0.5" opacity="0.6"/>

  <!-- MÂCHOIRE INFÉRIEURE -->
  <path d="M 24 56 Q 24 62 35 66 L 65 66 Q 76 62 76 56" fill="url(#skullGrad)" stroke="#888888" stroke-width="1.2"/>

  <!-- Ombres de la mâchoire inférieure -->
  <ellipse cx="50" cy="64" rx="24" ry="6" fill="url(#shadowGrad)" opacity="0.4"/>

  <!-- DENTS INFÉRIEURES (détaillées) -->
  <g id="lowerTeeth">
    <!-- Dents 1-2 (gauche) -->
    <rect x="26" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="31.5" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
    <!-- Dents 3-4 (centre-gauche) -->
    <rect x="37" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="42.5" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
    <!-- Dents 5-6 (centre-droit) -->
    <rect x="48" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="53.5" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
    <!-- Dents 7-8 (droite) -->
    <rect x="59" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
    <rect x="64.5" y="56" width="4.5" height="8" fill="#F0F0F0" stroke="#AAAAAA" stroke-width="0.7"/>
  </g>

  <!-- DÉTAILS SUPPLÉMENTAIRES -->
  <!-- Fissures et texture osseuse -->
  <path d="M 35 25 Q 40 30 35 38" stroke="#999999" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M 65 25 Q 60 30 65 38" stroke="#999999" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Craquelures sur le crâne -->
  <path d="M 50 22 L 48 28" stroke="#888888" stroke-width="0.4" fill="none" opacity="0.5"/>
  <path d="M 50 22 L 52 28" stroke="#888888" stroke-width="0.4" fill="none" opacity="0.5"/>

  <!-- ÉCLAT/LUMIÈRE (reflet du crâne) -->
  <ellipse cx="40" cy="25" rx="6" ry="8" fill="#FFFFFF" opacity="0.15"/>
  <ellipse cx="65" cy="20" rx="4" ry="6" fill="#FFFFFF" opacity="0.1"/>

  <!-- Aura sombre autour du crâne -->
  <circle cx="50" cy="45" r="38" fill="none" stroke="#2a2a2a" stroke-width="1.5" opacity="0.3"/>

  <!-- DÉCOR: Petits détails sinistres -->
  <!-- Croix or/jaune en haut -->
  <g transform="translate(50, 12)">
    <circle cx="0" cy="0" r="2" fill="#FFD700" opacity="0.7"/>
    <line x1="-2.5" y1="0" x2="2.5" y2="0" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="-2.5" x2="0" y2="2.5" stroke="#FFD700" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
